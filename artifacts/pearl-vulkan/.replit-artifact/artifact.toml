kind = "web"
previewPath = "/"
title = "Pearl Vulkan"
version = "1.0.0"
id = "artifacts/pearl-vulkan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23631

[services.development]
run = "pnpm --filter @workspace/pearl-vulkan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pearl-vulkan", "run", "build" ]
publicDir = "artifacts/pearl-vulkan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23631"
BASE_PATH = "/"
