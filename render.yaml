databases:
  - name: pearl-vulkan-db
    plan: free
    databaseName: pearl_vulkan
    user: pearl_vulkan

services:
  - type: web
    name: pearl-vulkan
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:prod
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: pearl-vulkan-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
